name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fonttools brotli tqdm

      - name: Cache font downloads
        uses: actions/cache@v4
        with:
          path: |
            dist
            .build
          key: fonts-${{ hashFiles('download_fonts.py') }}

      - name: Download fonts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python download_fonts.py

      - name: Convert to WOFF2
        run: |
          python -c "
          from build_bundle import build_woff2_fonts
          build_woff2_fonts()
          "

      - name: Build site bundle
        run: python build_site.py

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy site to scaffold
        run: |
          rsync -avz --delete --exclude 'bundle/' \
            dist/site/ \
            deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/fonts.noisedeck.app/content/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync fonts to S3
        run: |
          aws s3 sync dist/site/ s3://noisedeck-fonts/ \
            --cache-control "public, max-age=300" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.FONTS_CF_DISTRIBUTION_ID }} \
            --paths "/*"
