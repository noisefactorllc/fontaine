name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site bundle
        run: python build_site.py

      - name: Sync site to S3
        uses: noisedeck/s3-sync-action@master
        with:
          args: --follow-symlinks --exclude "bundle/*"
        env:
          AWS_S3_BUCKET: 'noisedeck-fonts'
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-1'
          SOURCE_DIR: 'dist/site'

      - name: Invalidate CloudFront cache for site files
        uses: noisedeck/invalidate-cloudfront-action@master
        env:
          DISTRIBUTION: 'E14WURW4E0YYTW'
          PATHS: '/index.html /font-loader.js'
          AWS_REGION: 'us-east-1'
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
