name: Deploy Site

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fonttools brotli tqdm

      - name: Cache font downloads
        uses: actions/cache@v4
        with:
          path: |
            dist
            .build
            .build-block
          key: fonts-${{ hashFiles('download_fonts.py', 'build_block_fonts.py') }}

      - name: Download fonts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python download_fonts.py

      - name: Convert to WOFF2
        run: |
          python -c "
          from build_bundle import build_woff2_fonts
          build_woff2_fonts()
          "

      - name: Build block fonts
        run: python build_block_fonts.py

      - name: Build site bundle
        run: python build_site.py

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy site to scaffold
        run: |
          rsync -avz --exclude 'bundle/' \
            dist/site/ \
            deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/fonts.noisefactor.io/content/
