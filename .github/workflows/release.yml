name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fonttools Pillow brotli tqdm

      - name: Download fonts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python download_fonts.py

      - name: Build bundle
        run: python build_bundle.py

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create release archive
        run: |
          mkdir -p release
          cp bundle/fonts.zip release/fontaine-${{ steps.version.outputs.version }}-fonts.zip
          cp bundle/fonts.json release/
          cp bundle/manifest.json release/
          cp font-loader.js release/
          cp README.md release/
          cp LICENSE release/
          cd release && zip -r ../fontaine-${{ steps.version.outputs.version }}.zip .

      - name: Generate release notes
        id: notes
        run: |
          FONT_COUNT=$(jq '.total_fonts' bundle/manifest.json)
          BUNDLE_SIZE=$(jq '.bundle_size' bundle/manifest.json)
          BUNDLE_SIZE_MB=$(echo "scale=1; $BUNDLE_SIZE / 1048576" | bc)
          
          cat << EOF > release_notes.md
          ## fontaine v${{ steps.version.outputs.version }}
          
          A curated collection of freely distributable web fonts with an async, cache-aware loader.
          
          ### Bundle Info
          - **Fonts:** $FONT_COUNT
          - **Bundle Size:** ${BUNDLE_SIZE_MB} MB
          
          ### Files
          - \`fontaine-${{ steps.version.outputs.version }}.zip\` - Complete release bundle
          - \`fontaine-${{ steps.version.outputs.version }}-fonts.zip\` - Font files only (WOFF2)
          - \`fonts.json\` - Font catalog with metadata
          - \`manifest.json\` - Bundle manifest
          - \`font-loader.js\` - JavaScript font loader
          
          ### Quick Start
          \`\`\`html
          <script src="font-loader.js"></script>
          <script>
            const loader = new FontLoader();
            await loader.load('./bundle');
          </script>
          \`\`\`
          
          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: fontaine ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'SNAPSHOT') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            fontaine-${{ steps.version.outputs.version }}.zip
            release/fontaine-${{ steps.version.outputs.version }}-fonts.zip
            release/fonts.json
            release/manifest.json
            release/font-loader.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bundle directory
        run: |
          mkdir -p dist/bundle
          cp bundle/fonts.zip dist/bundle/
          cp bundle/fonts.json dist/bundle/
          cp bundle/manifest.json dist/bundle/
          cp font-loader.js dist/bundle/

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy bundle to scaffold
        run: |
          rsync -avz \
            dist/bundle/ \
            deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/fonts.noisedeck.app/content/bundle/
