name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'example.html'
      - 'font-loader.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site pages
        run: |
          mkdir -p dist/site/demo
          cp index.html dist/site/index.html
          cp example.html dist/site/demo/index.html
          cp font-loader.js dist/site/demo/font-loader.js

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SCAFFOLD_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SCAFFOLD_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy pages only
        run: |
          DEST="deploy@${{ secrets.SCAFFOLD_SERVER_IP }}:~/sites/fonts.noisefactor.io/content/"
          rsync -avz dist/site/index.html "$DEST"
          rsync -avz dist/site/demo/ "${DEST}demo/"

      - name: Generate app token
        if: success()
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 2959521
          private-key: ${{ secrets.EHSRE_APP_PRIVATE_KEY }}
          owner: noisefactorllc

      - name: Purge CDN cache
        if: success()
        run: |
          curl -sf -X POST https://api.github.com/repos/noisefactorllc/scaffold/dispatches \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"cdn-purge","client_payload":{"domain":"fonts.noisefactor.io"}}'
