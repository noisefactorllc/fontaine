name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Audit-mode egress monitoring: records every outbound connection the
      # runner makes so exfil/C2 from a compromised dependency is detectable.
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install project (optional — monolith repos may not be pip packages)
        id: install_project
        continue-on-error: true
        run: |
          if [ -f pyproject.toml ] && grep -qE '^\[project\]' pyproject.toml; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e .
          else
            echo "No [project] table — skipping editable install"
          fi

      - name: Run pytest
        if: steps.install_project.outcome == 'success'
        run: |
          if [ -d tests ] || grep -qE '^\[tool\.pytest' pyproject.toml 2>/dev/null; then
            pip install pytest
            pytest --no-header -q
          else
            python -c "import sys; print('Python', sys.version)"
          fi
